<!doctype html>
<html lang="fa">
<head>
<meta charset="UTF-8" />
<title>این سبزه که امروز تماشاگه ماست</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0d1210;
    --dusk1:#101b1c;
    --dusk2:#1c3436;
    --gold:#d1a24a;
    --gold-soft:#e8c47a;
    --terracotta:#c2683f;
    --sage:#5c8a6f;
    --sage-dim:#3c5c49;
    --cream:#ece3d0;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--ink);overflow:hidden;height:100%;}
  .stage{
    position:relative;
    width:100%;
    height:100vh;
    min-height:520px;
    background: linear-gradient(180deg, var(--dusk1) 0%, var(--dusk2) 55%, #0a1310 100%);
    overflow:hidden;
  }
  svg{position:absolute; inset:0; width:100%; height:100%; display:block;}

  .text-wrap{
    position:absolute;
    left:50%; top:38%;
    transform:translate(-50%,-50%);
    text-align:center;
    width:min(90%, 780px);
    pointer-events:none;
  }
  .couplet{
    font-family:'Noto Nastaliq Urdu', serif;
    color:var(--cream);
    font-size:clamp(1.6rem, 4.2vw, 3rem);
    line-height:2.3;
    direction:rtl;
    opacity:0;
    text-shadow: 0 2px 24px rgba(0,0,0,0.55);
    animation: textCycle 16s ease-in-out infinite;
  }
  .couplet .line2{
    color:var(--gold-soft);
    display:block;
  }
  .translation{
    font-family: Georgia, serif;
    font-style:italic;
    color:#b9c2b7;
    font-size: clamp(.78rem, 1.3vw, .95rem);
    letter-spacing:.02em;
    margin-top:14px;
    opacity:0;
    animation: transCycle 16s ease-in-out infinite;
  }

  @keyframes textCycle{
    0%   { opacity:0; transform:translate(-50%,-42%); filter: blur(4px);}
    8%   { opacity:1; transform:translate(-50%,-50%); filter: blur(0);}
    62%  { opacity:1; }
    78%  { opacity:0; filter: blur(3px);}
    100% { opacity:0; }
  }
  @keyframes transCycle{
    0%   { opacity:0; }
    14%  { opacity:1; }
    62%  { opacity:1; }
    74%  { opacity:0; }
    100% { opacity:0; }
  }

  .credit{
    position:absolute; bottom:16px; right:22px;
    font-family:'Trebuchet MS',sans-serif; font-size:.68rem;
    letter-spacing:.08em; color:#6c766e; text-transform:uppercase;
  }
</style>
</head>
<body>
<div class="stage">
  <svg id="scene" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMax slice"></svg>

  <div class="text-wrap">
    <div class="couplet">
      این سبزه که امروز تماشاگه ماست
      <span class="line2">تا سبزهٔ خاک ما تماشاگه کیست</span>
    </div>
    <div class="translation">
      This grass we watch today, so green, so near —<br>
      whose watching-ground will rise from our own dust?
    </div>
  </div>

  <div class="credit">Khayyám · rubāʿī no. 8</div>
</div>

<script>
(function(){
  const svg = document.getElementById('scene');
  const NS = 'http://www.w3.org/2000/svg';
  const W = 1200, H = 600;
  const GROUND_Y = 470;

  function el(tag, attrs){
    const e = document.createElementNS(NS, tag);
    for(const k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }

  // soft radial glow, dusk sky accent (gold horizon glow)
  const defs = el('defs',{});
  const grad = el('radialGradient',{id:'horizonGlow', cx:'50%', cy:'82%', r:'60%'});
  grad.appendChild(el('stop',{offset:'0%','stop-color':'#7a5a2c','stop-opacity':'0.35'}));
  grad.appendChild(el('stop',{offset:'100%','stop-color':'#000','stop-opacity':'0'}));
  defs.appendChild(grad);
  svg.appendChild(defs);
  svg.appendChild(el('rect',{x:0,y:0,width:W,height:H,fill:'url(#horizonGlow)'}));

  // ground line
  svg.appendChild(el('rect',{x:0,y:GROUND_Y+18,width:W,height:H-GROUND_Y-18,fill:'#0a1310'}));
  svg.appendChild(el('line',{x1:0,y1:GROUND_Y+18,x2:W,y2:GROUND_Y+18,stroke:'#3c5c49',opacity:0.3,'stroke-width':1}));

  const bladesGroup = el('g',{id:'blades'});
  svg.appendChild(bladesGroup);

  const dustGroup = el('g',{id:'dust'});
  svg.appendChild(dustGroup);

  // generate a field of blades across the width, varied height/curve
  const blades = [];
  const count = 140;
  for(let i=0;i<count;i++){
    const x = (W/count)*i + (Math.random()*10-5);
    const baseH = 40 + Math.random()*90;
    const lean = (Math.random()*36 - 18);
    const width = 2 + Math.random()*2.2;
    const hueShift = Math.random();
    const color = hueShift < 0.15 ? '#c2683f' : (hueShift < 0.3 ? '#e8c47a' : (Math.random()<0.5?'#5c8a6f':'#3c5c49'));
    const delay = Math.random()*3;
    const y0 = GROUND_Y + 14 + Math.random()*4;

    const path = el('path', {
      d: bladePath(x, y0, baseH, lean, false),
      fill:'none',
      stroke: color,
      'stroke-width': width,
      'stroke-linecap':'round',
      opacity: 0
    });
    bladesGroup.appendChild(path);
    blades.push({path, x, y0, baseH, lean, color, delay});
  }

  function bladePath(x, y0, h, lean, wilt){
    const growth = wilt ? h*0.35 : h;
    const tipX = x + lean;
    const tipY = y0 - growth;
    const cx1 = x + lean*0.3;
    const cy1 = y0 - growth*0.5;
    return `M ${x.toFixed(1)},${y0.toFixed(1)} Q ${cx1.toFixed(1)},${cy1.toFixed(1)} ${tipX.toFixed(1)},${tipY.toFixed(1)}`;
  }

  // dust motes rising (used during the "return to dust" phase)
  const motes = [];
  for(let i=0;i<70;i++){
    const c = el('circle', {
      cx: Math.random()*W,
      cy: GROUND_Y + Math.random()*10,
      r: 0.8 + Math.random()*1.6,
      fill:'#d1a24a',
      opacity: 0
    });
    dustGroup.appendChild(c);
    motes.push({el:c, baseX: parseFloat(c.getAttribute('cx')), drift: (Math.random()*40-20)});
  }

  // animation cycle: grow (0-40%) -> hold (40-60%) -> wilt+dust (60-85%) -> clear (85-100%)
  const CYCLE_MS = 16000;
  let start = performance.now();

  function ease(t){ return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }

  function frame(now){
    let t = ((now - start) % CYCLE_MS) / CYCLE_MS;

    blades.forEach(b=>{
      let local = Math.min(1, Math.max(0, (t*CYCLE_MS/1000 - b.delay) / 4));
      let growPhase, wiltAmt=0, op=0;

      if(t < 0.42){
        growPhase = ease(Math.min(1, local));
        op = growPhase;
        wiltAmt = 0;
      } else if(t < 0.6){
        growPhase = 1; op = 1; wiltAmt = 0;
      } else if(t < 0.85){
        const wt = (t-0.6)/0.25;
        growPhase = 1;
        wiltAmt = wt;
        op = Math.max(0, 1 - wt*1.3);
      } else {
        growPhase = 0; op = 0; wiltAmt = 1;
      }

      const h = b.baseH * growPhase * (1 - wiltAmt*0.5);
      const lean = b.lean * (1 + wiltAmt*1.4);
      b.path.setAttribute('d', bladePath(b.x, b.y0, h, lean, false));
      b.path.setAttribute('opacity', op.toFixed(2));
    });

    // dust rises during wilt phase (0.6 - 0.95), settles after
    let dustOp = 0, riseT = 0;
    if(t >= 0.58 && t < 0.95){
      riseT = (t-0.58)/0.37;
      dustOp = Math.sin(riseT*Math.PI);
    }
    motes.forEach((m,i)=>{
      const phase = (riseT + i*0.01) % 1;
      m.el.setAttribute('cy', (GROUND_Y - phase*90).toFixed(1));
      m.el.setAttribute('cx', (m.baseX + Math.sin(phase*6+i)*m.drift*0.3).toFixed(1));
      m.el.setAttribute('opacity', (dustOp*0.7).toFixed(2));
    });

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
